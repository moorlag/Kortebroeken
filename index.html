<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kortebroekenweer bij NOLAI?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f9f7;
      font-family: 'Nunito', sans-serif;
      padding: 3rem 1rem 2.5rem;
    }

    .logo {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b52718;
      margin-bottom: 2rem;
    }

    .img-wrap {
      width: 340px;
      height: 340px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .question {
      font-size: 22px;
      font-weight: 400;
      color: #1a5c4a;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .answer {
      font-size: 72px;
      font-weight: 900;
      color: #b52718;
      line-height: 1;
      text-align: center;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .speel-link {
      margin-top: 2rem;
      font-size: 14px;
      font-weight: 700;
      color: #2f8f86;
      text-decoration: none;
      border: 2px solid #2f8f86;
      border-radius: 14px;
      padding: 0.55rem 1rem;
      transition: background 0.15s, color 0.15s;
    }
    .speel-link:hover { background: #2f8f86; color: #fff; }
  </style>
</head>
<body>
  <p class="logo">NOLAI — Nationaal OnderwijsLab AI</p>
  <div class="img-wrap">
    <img src="Kortebroek.jpeg" alt="Robot surft op een golf" />
  </div>
  <p class="question">Is het kortebroekenweer bij NOLAI?</p>
  <p class="answer">JA!</p>
  <a class="speel-link" href="botty.html">🤖 Speel met Botty →</a>
</body>
</html>
