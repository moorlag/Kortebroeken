    <circle cx="910" cy="360" r="3"/><circle cx="820" cy="520" r="3"/><circle cx="900" cy="700" r="4"/>
    <circle cx="800" cy="850" r="3"/><circle cx="500" cy="110" r="3"/><circle cx="650" cy="140" r="3"/>
    <circle cx="370" cy="135" r="3"/><circle cx="512" cy="900" r="3"/>
  </g>

  <!-- Hex-hive ring rond de kop -->
  <g fill="none" stroke="#39ff85" stroke-width="3.5" opacity="0.32">
    <g transform="translate(512 512)">
      <g transform="rotate(0)   translate(0 -395)"><path d="M0,-42 L36.4,-21 L36.4,21 L0,42 L-36.4,21 L-36.4,-21 Z"/></g>
      <g transform="rotate(60)  translate(0 -395)"><path d="M0,-42 L36.4,-21 L36.4,21 L0,42 L-36.4,21 L-36.4,-21 Z"/></g>
      <g transform="rotate(120) translate(0 -395)"><path d="M0,-42 L36.4,-21 L36.4,21 L0,42 L-36.4,21 L-36.4,-21 Z"/></g>
      <g transform="rotate(180) translate(0 -395)"><path d="M0,-42 L36.4,-21 L36.4,21 L0,42 L-36.4,21 L-36.4,-21 Z"/></g>
      <g transform="rotate(240) translate(0 -395)"><path d="M0,-42 L36.4,-21 L36.4,21 L0,42 L-36.4,21 L-36.4,-21 Z"/></g>
      <g transform="rotate(300) translate(0 -395)"><path d="M0,-42 L36.4,-21 L36.4,21 L0,42 L-36.4,21 L-36.4,-21 Z"/></g>
    </g>
  </g>

  <circle cx="512" cy="525" r="330" fill="url(#glow)"/>

  <!-- ===== Botty-kop gecentreerd ===== -->
  <g transform="translate(512 528) scale(3.7) translate(-100 -72)">
    <g>
      <path d="M100,46 Q96,18 113,8" fill="none" stroke="#0c2a1d" stroke-width="3" stroke-linecap="round"/>
      <circle cx="115" cy="4" r="7.5" fill="#39ff85" filter="url(#soft)" opacity="0.8"/>
      <circle cx="115" cy="4" r="7.5" fill="#39ff85" stroke="#0c2a1d" stroke-width="2.5"/>
    </g>
    <circle cx="52" cy="76" r="13" fill="url(#broek)" stroke="#0c2a1d" stroke-width="2.5"/>
    <circle cx="52" cy="76" r="6" fill="#0c2a1d"/>
    <circle cx="148" cy="76" r="13" fill="url(#broek)" stroke="#0c2a1d" stroke-width="2.5"/>
    <circle cx="148" cy="76" r="6" fill="#0c2a1d"/>
    <path d="M72,46 Q52,48 52,76 Q52,108 72,122 Q100,134 128,122 Q148,108 148,76 Q148,48 128,46 Q100,40 72,46 Z"
