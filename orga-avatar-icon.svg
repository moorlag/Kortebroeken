<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#0d4327"/>
      <stop offset="45%" stop-color="#06291a"/>
      <stop offset="100%" stop-color="#03140d"/>
    </radialGradient>
    <linearGradient id="broek" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4dffa0"/>
      <stop offset="100%" stop-color="#23c46e"/>
    </linearGradient>
    <linearGradient id="scherm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a1f"/>
      <stop offset="100%" stop-color="#061d16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39ff85" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#39ff85" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#39ff85" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Matrix-stippen -->
  <g fill="#39ff85" opacity="0.16">
    <circle cx="140" cy="190" r="4"/><circle cx="210" cy="330" r="3"/><circle cx="110" cy="500" r="3"/>
