    <line x1="110" y1="78" x2="110" y2="90" stroke="#39ff85" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M93,97 Q100,101 107,97 Q106,108 100,109 Q94,108 93,97 Z" fill="#39ff85"/>
